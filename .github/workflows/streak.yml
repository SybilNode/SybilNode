name: Generate Streak Stats

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.PAT_1 }}
          user: zappybird
          theme: onedark
          hide_border: true
          file: profile/streak.svg

      - name: Generate Streak Stats
      run: |
        mkdir -p profile
        curl -o profile/streak.svg "https://streak-stats.demolab.com?user=zappybird&theme=onedark&hide_border=true"
