name: Generate Streak Stats

permissions:
  contents: write

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Download streak card SVG
        run: |
          curl -fsSL \
            "https://streak-stats.demolab.com?user=SybilNode&theme=dark&hide_border=true&border_radius=6&date_format=j%20M%5B%20Y%5D" \
            -o profile/streak.svg
          if [ ! -s profile/streak.svg ]; then
            echo "ERROR: streak.svg is empty or failed to download" >&2
            exit 1
          fi
          echo "streak.svg downloaded successfully ($(wc -c < profile/streak.svg) bytes)"

      - name: Commit streak card
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main
          git add profile/streak.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update streak card [skip ci]"
          git push