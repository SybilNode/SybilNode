name: Update README cards

permissions:
  contents: write

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Generate stats card
        run: |
          curl -fsSL \
            "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=onedark" \
            -o profile/stats.svg
          if [ ! -s profile/stats.svg ]; then
            echo "ERROR: stats.svg is empty or failed to download" >&2
            exit 1
          fi
          echo "stats.svg downloaded ($(wc -c < profile/stats.svg) bytes)"

      - name: Generate top languages card
        run: |
          curl -fsSL \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=onedark" \
            -o profile/top-langs.svg
          if [ ! -s profile/top-langs.svg ]; then
            echo "ERROR: top-langs.svg is empty or failed to download" >&2
            exit 1
          fi
          echo "top-langs.svg downloaded ($(wc -c < profile/top-langs.svg) bytes)"

      - name: Commit cards
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add profile/stats.svg profile/top-langs.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update README cards [skip ci]"
          git push