name: Update LOC Stats
permissions:
  contents: write
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  update-loc:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Install Tokei
        run: |
          TOKEI_VERSION="12.1.2"
          curl -L "https://github.com/XAMPPRocky/tokei/releases/download/v${TOKEI_VERSION}/tokei-x86_64-unknown-linux-gnu.tar.gz" -o tokei.tar.gz
          tar xzf tokei.tar.gz
          sudo mv tokei /usr/local/bin/
          tokei --version

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Make scripts executable
        # FIX: scripts live at repo root, not in a scripts/ subdirectory
        run: chmod +x count-loc.sh

      - name: Count lines of code across repos
        # FIX: run count-loc.sh from repo root so it can find repos.json
        # and writes loc-data.json to the correct location
        run: |
          bash count-loc.sh
          if [ ! -s loc-data.json ]; then
            echo "ERROR: loc-data.json is missing or empty after count-loc.sh" >&2
            exit 1
          fi
          echo "loc-data.json generated successfully ($(wc -c < loc-data.json) bytes)"

      - name: Generate SVG
        # FIX: generate-svg.py is at root, not scripts/
        run: |
          python3 generate-svg.py
          if [ ! -s loc-stats.svg ]; then
            echo "ERROR: loc-stats.svg is missing or empty after generate-svg.py" >&2
            exit 1
          fi
          echo "loc-stats.svg generated successfully"

      - name: Update README with SVG
        run: |
          if grep -q "<!-- LOC-STATS:START -->" README.md; then
            sed -i '/<!-- LOC-STATS:START -->/,/<!-- LOC-STATS:END -->/c\<!-- LOC-STATS:START -->\n<img src="./loc-stats.svg" alt="LOC Stats" width="84%" />\n<!-- LOC-STATS:END -->' README.md
          else
            echo "Warning: LOC-STATS markers not found in README.md"
          fi

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main
          git add loc-stats.svg loc-data.json README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update LOC statistics [skip ci]"
          git push origin main